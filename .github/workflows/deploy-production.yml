# .github/workflows/deploy-production.yml
# Manual trigger only — production deploys require explicit approval

name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy"
        required: true
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

jobs:
  guard:
    name: Confirm Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "Confirmation failed. Input must be exactly: deploy"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: guard
    environment: production    # requires GitHub environment approval
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sha }}

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Rolling deploy
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=ghcr.io/${{ github.repository }}/api-gateway:${{ github.event.inputs.sha }} \
            -n production
          kubectl set image deployment/auth-service \
            auth-service=ghcr.io/${{ github.repository }}/auth-service:${{ github.event.inputs.sha }} \
            -n production
          kubectl set image deployment/core-service \
            core-service=ghcr.io/${{ github.repository }}/core-service:${{ github.event.inputs.sha }} \
            -n production
          kubectl rollout status deployment/api-gateway -n production --timeout=10m

      - name: Tag release
        run: git tag "release-$(date +%Y%m%d)-${{ github.event.inputs.sha }}" && git push --tags
